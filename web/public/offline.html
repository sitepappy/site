<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <title>PAPPY — Offline</title>
    <style>
      html, body { height: 100%; margin: 0; background: #0a0a0f; color: #fff; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
      .wrap { min-height: 100%; display: grid; place-items: center; padding: 24px; }
      .card { width: 100%; max-width: 520px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
      .title { font-weight: 900; font-style: italic; letter-spacing: -0.03em; font-size: 36px; margin: 0; }
      .sub { margin: 10px 0 0; color: rgba(255,255,255,0.55); font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; font-size: 11px; }
      .btn { display: inline-block; margin-top: 18px; padding: 14px 16px; border-radius: 18px; text-decoration: none; font-weight: 900; text-transform: uppercase; letter-spacing: 0.14em; font-size: 11px; color: #0a0a0f; background: #39FF14; }
      .hint { margin-top: 18px; color: rgba(255,255,255,0.35); font-size: 12px; line-height: 1.6; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1 class="title">PAPPY</h1>
        <div class="sub">Нет подключения</div>
        <div class="hint">
          Проверь интернет и открой снова. Если соединение появилось — обновление подтянется автоматически.
        </div>
        <a class="btn" href="/">Повторить</a>
      </div>
    </div>
  </body>
</html>
